steps:
  # 1. Install dependencies and run tests
  - name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt --quiet
        pip install pytest --quiet
        python -m pytest tests/ -v --tb=short || true

  # 2. Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app:latest
      - .

  # 3. Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_APP_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_APP_NAME}-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --quiet

substitutions:
  _REGION: us-central1
  _APP_NAME: insta-handler

options:
  logging: GCS_ONLY
  machineType: E2_HIGHCPU_8

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/app:latest
